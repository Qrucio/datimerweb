<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="slider-group">
      <label><span id="speed-label">1.00x</span></label>
      
      <input type="range" id="speed-slider" min="0.5" max="4" step="0.25" value="1.0">
    </div>
    <div class="button-group">
      <button data-speed="0.5">0.5x</button>
      <button data-speed="1.0">1.0x</button>
      <button data-speed="1.5">1.5x</button>
      <button data-speed="2.0">2.0x</button>
      <button data-speed="3.0">3.0x</button>
      <button data-speed="4.0">4.0x</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
